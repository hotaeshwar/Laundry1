<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ FAVICONS -->

    <!-- ✅ VIEWPORT -->

    <!-- ✅ PRIMARY SEO -->

    <meta name="theme-color" content="#1aa6b3" />
    <link rel="canonical" href="https://laundryforall.ca/" />

    <!-- ✅ OPEN GRAPH (Google + Facebook + LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LaundryForAll" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Affordable laundry pickup & delivery across Canada. Wash, dry, fold. Book online in seconds!" />
    <meta name="twitter:image" content="https://laundryforall.ca/images/LFA-03.png" />

    <!-- ✅ GEO TARGETING (Canada) -->
    <meta name="geo.region" content="CA" />
    <meta name="geo.placename" content="Canada" />
    <meta name="language" content="English" />

    <!-- ✅ LOCAL BUSINESS SCHEMA (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "LaundryForAll",
      "url": "https://laundryforall.ca",
      "logo": "https://laundryforall.ca/images/LFA-03.png",
      "image": "https://laundryforall.ca/images/LFA-03.png",
      "description": "Professional laundry pickup and delivery service across Canada. Wash, dry, fold and more.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CA"
      },
      "openingHours": "Mo-Su 08:00-20:00",
      "priceRange": "$$",
      "telephone": "+1-YOUR-PHONE-HERE",
      "sameAs": [
        "https://www.facebook.com/laundryforall",
        "https://www.instagram.com/laundryforall"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Laundry Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Laundry Pickup & Delivery"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Wash & Fold"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Laundry Franchise"
            }
          }
        ]
      }
    }
    </script>

    <!-- ✅ WEBSITE SCHEMA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LaundryForAll",
      "url": "https://laundryforall.ca",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://laundryforall.ca/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ✅ BREADCRUMB SCHEMA (matches your hash-based pages) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",      "item": "https://laundryforall.ca/" },
        { "@type": "ListItem", "position": 2, "name": "Services",  "item": "https://laundryforall.ca/#services" },
        { "@type": "ListItem", "position": 3, "name": "Pricing",   "item": "https://laundryforall.ca/#pricing" },
        { "@type": "ListItem", "position": 4, "name": "Franchise", "item": "https://laundryforall.ca/#franchise" },
        { "@type": "ListItem", "position": 5, "name": "Booking",   "item": "https://laundryforall.ca/#booking" },
        { "@type": "ListItem", "position": 6, "name": "Contact",   "item": "https://laundryforall.ca/#contact" }
      ]
    }
    </script>

  </head>
