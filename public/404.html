<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaundryForAll | Page Not Found</title>
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages SPA fix — redirects 404s back to index.html
      // preserving the path so React Router / hash routing still works
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p style="font-family:sans-serif;text-align:center;margin-top:4rem;color:#1aa6b3;">
      Redirecting to LaundryForAll…
    </p>
  </body>
</html>
